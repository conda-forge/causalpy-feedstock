schema_version: 1

context:
  name: causalpy
  version: "0.8.1"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: c3bed7cb736c33c970f3430900d2647af6e2962da31ba4e5cc31f21e0a0be578

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools >=61.0
  run:
    - python >=${{ python_min }}
    - arviz >=0.14.0
    - python-graphviz
    - ipython !=8.7.0
    - matplotlib-base >=3.5.3
    - numpy <2.4
    - pandas
    - patsy
    - pymc >=5.15.1,<6
    - pytensor >=2.38.1,<3
    - scikit-learn >=1
    - scipy
    - seaborn >=0.11.2
    - statsmodels
    - xarray >=v2022.11.0
    - pymc-extras >=0.3.0

tests:
  - python:
      imports:
        - causalpy
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - 3.*

about:
  summary: Causal inference for quasi-experiments in Python
  license: Apache-2.0
  license_file: LICENSE
  homepage: https://github.com/pymc-labs/CausalPy
  documentation: https://causalpy.readthedocs.io/

extra:
  recipe-maintainers:
    - maresb
    - thewchan
